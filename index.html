<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Visualizer - Base Canvas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f1115;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #map-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Styling your raw Earth vector shapes */
        svg {
            width: 100%;
            height: 100%;
            max-width: 1200px;
        }

        /* Target the landmass paths from the loaded SVG */
        .land {
            fill: #2d3748;
            stroke: #1a202c;
            stroke-width: 0.5;
            transition: fill 0.3s ease;
        }

        .land:hover {
            fill: #4a5568;
        }

        #controls {
            background: #1a202c;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #2d3748;
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="map-wrapper" style="width: 100%; height: 100%;"></div>
    </div>

    <div id="controls">
        <h3>Earth Vector Canvas</h3>
        <p>Ready for Firebase integration. No predefined borders.</p>
    </div>

    <script>
        // Fetch a clean, borderless world landmass SVG (Robinson projection)
        // This keeps your repository lightweight while giving you a perfect vector base.
        fetch('https://raw.githubusercontent.com/djaiss/mapsicon/master/all/world/vector.svg')
            .then(response => response.text())
            .then(svgText => {
                const parser = new DOMParser();
                const svgDoc = parser.parseFromString(svgText, 'image/svg+xml');
                const svgElement = svgDoc.querySelector('svg');
                
                // Configure attributes for responsiveness
                svgElement.setAttribute('width', '100%');
                svgElement.setAttribute('height', '100%');
                
                // Add a class to all paths inside the SVG so you can style/manipulate them
                svgElement.querySelectorAll('path').forEach(path => {
                    path.classList.add('land');
                });

                document.getElementById('map-wrapper').appendChild(svgElement);
            })
            .catch(err => console.error('Error loading world vector map:', err));
    </script>
</body>
</html>
