<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global History Timeline</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <div id="map-container"></div>

    <div id="top-bar">
        <select id="dataset-select">
            <option value="milestones">Curated Historical Milestones</option>
            <option value="decades">Raw Decades (1000 CE - 1930 CE)</option>
            <option value="centuries">Raw Centuries (2000 BCE - 1000 CE)</option>
        </select>
        
        <div id="year-display">Loading Map...</div>
        
        <input type="range" id="slider">
    </div>

    <script src="script.js"></script>
</body>
</html>
