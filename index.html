<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0d0f12;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        /* Style for the map container */
        #map-container {
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #map-container:active {
            cursor: grabbing;
        }
        /* Style the landmass countries */
        .country {
            fill: #242936;
            stroke: #171b26;
            stroke-width: 0.5px;
            transition: fill 0.2s;
        }
        .country:hover {
            fill: #2d3546;
        }
    </style>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson@3"></script>
</head>
<body>

    <div id="map-container"></div>

    <script>
        const width = window.innerWidth;
        const height = window.innerHeight;

        // Create the SVG element inside our container
        const svg = d3.select("#map-container")
            .append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Set up the Map Projection (Natural Earth projection looks great for history maps)
        const projection = d3.geoNaturalEarth1()
            .scale(width / 5.5)
            .translate([width / 2, height / 2]);

        const path = d3.geoPath().projection(projection);

        // Add Zoom and Pan functionality
        const zoom = d3.zoom()
            .scaleExtent([1, 8]) // Min zoom 1x, Max zoom 8x
            .on("zoom", (event) => {
                g.attr("transform", event.transform);
            });

        svg.call(zoom);

        // Load and render high-quality world vector data
        d3.json("https://unpkg.com/world-atlas@2.0.2/countries-110m.json").then(data => {
            const countries = topojson.feature(data, data.objects.countries).features;

            g.selectAll("path")
                .data(countries)
                .enter()
                .append("path")
                .attr("class", "country")
                .attr("d", path);
        }).catch(error => {
            console.error("Error loading the map data: ", error);
        });

        // Handle window resizing dynamically
        window.addEventListener('resize', () => {
            const w = window.innerWidth;
            const h = window.innerHeight;
            svg.attr("width", w).attr("height", h);
        });
    </script>

</body>
</html>
